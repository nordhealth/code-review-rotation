default_language_version:
    python: python3.11

repos:
  # Linting + formatting (replaces black, isort, autoflake)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # Run tests before commit
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: poetry run python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        args: [tests/, -v, --tb=short]
        stages: [commit]
