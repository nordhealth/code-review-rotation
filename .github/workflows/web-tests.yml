name: Web App Tests

on:
  pull_request:
    branches: [master, main]
    paths:
      - "web/**"
      - ".github/workflows/web-tests.yml"
  push:
    branches: [master, main]
    paths:
      - "web/**"
      - ".github/workflows/web-tests.yml"

defaults:
  run:
    working-directory: web

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm vitest run --reporter=verbose --coverage --exclude='**/tests/e2e/**'

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: web/coverage/lcov.info
          flags: web-unit
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NUXT_SESSION_PASSWORD: ci-test-session-password-32chars!!
          NUXT_API_KEY: ci-test-api-key

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            web/.output
            web/.data
          retention-days: 1

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web

      - name: Run smoke tests
        run: pnpm vitest run tests/e2e/smoke --reporter=verbose
        env:
          NUXT_SESSION_PASSWORD: ci-test-session-password-32chars!!
          NUXT_API_KEY: ci-test-api-key
          TEST_E2E: "true"

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web

      - name: Run regression tests
        run: pnpm vitest run tests/e2e/regression --reporter=verbose
        env:
          NUXT_SESSION_PASSWORD: ci-test-session-password-32chars!!
          NUXT_API_KEY: ci-test-api-key
          TEST_E2E: "true"
